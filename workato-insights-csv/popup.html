<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">

<!--
  CSP: 拡張機能内のリソースのみ許可。
       - default-src 'none'              : デフォルト全拒否
       - script-src  'self'              : popup.js のみ実行可
       - style-src   'self' 'unsafe-inline' : <style> ブロックを許可
       - img-src     'self' data:        : 自己リソースと data URL のみ
       外部 CDN・eval 等は一切利用不可とする。
-->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">

<title>Workato Insights CSV</title>

<style>
  /* ------------------------------------------------------------------------ */
  /* デザイントークン (Claude デスクトップアプリのトーン)                      */
  /*   - クリーム地 (#faf9f5) にテラコッタ (#cc785c) のアクセント              */
  /*   - 角丸は 6-8px の控えめサイズ                                            */
  /*   - 影は暖色を混ぜた極薄                                                  */
  /* ------------------------------------------------------------------------ */
  :root {
    --bg: #faf9f5;
    --card: #ffffff;
    --card-tint: #fdfcf8;
    --border: #ece8df;
    --border-strong: #d9d3c4;
    --text: #1f1d18;
    --text-secondary: #5a564c;
    --text-muted: #948c7c;
    --primary: #cc785c;
    --primary-hover: #b56248;
    --primary-soft: #f7ece5;
    --primary-deep: #8b3f25;
    --warn-soft: #f7eccb;
    --warn-text: #7a5414;
    --shadow-sm: 0 1px 2px rgba(60, 40, 20, 0.05);
    --shadow-md: 0 1px 3px rgba(60, 40, 20, 0.06),
                 0 4px 14px rgba(60, 40, 20, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    width: 560px;
    margin: 0;
    padding: 0;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
  }

  /* ------------------------------------------------------------------------ */
  /* ヘッダー                                                                  */
  /* ------------------------------------------------------------------------ */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
    color: #fdfcf8;
    box-shadow: var(--shadow-sm);
    border-bottom: 1px solid rgba(60, 40, 20, 0.08);
  }
  .header-title { display: flex; align-items: center; gap: 8px; }
  .header-title h1 {
    font-size: 14px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .header-logo {
    width: 22px;
    height: 22px;
    background: rgba(255, 248, 240, 0.18);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .toolbar { display: flex; gap: 6px; }

  /* ------------------------------------------------------------------------ */
  /* ボタン                                                                    */
  /* ------------------------------------------------------------------------ */
  .btn {
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 500;
    letter-spacing: 0.1px;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    border: 1px solid transparent;
  }
  .btn-ghost {
    background: rgba(255, 248, 240, 0.18);
    color: #fdfcf8;
    border-color: rgba(255, 248, 240, 0.25);
  }
  .btn-ghost:hover { background: rgba(255, 248, 240, 0.28); }
  .btn-primary {
    background: var(--primary);
    color: #fdfcf8;
    border-color: var(--primary);
  }
  .btn-primary:hover {
    background: var(--primary-hover);
    border-color: var(--primary-hover);
  }
  .btn-secondary {
    background: var(--card);
    color: var(--text-secondary);
    border-color: var(--border-strong);
  }
  .btn-secondary:hover {
    background: var(--card-tint);
    color: var(--text);
    border-color: var(--primary);
  }
  .btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  /* ------------------------------------------------------------------------ */
  /* リスト本体                                                                */
  /* ------------------------------------------------------------------------ */
  #list { padding: 12px 16px 16px; }

  /* 空状態 */
  .empty {
    color: var(--text-muted);
    padding: 40px 16px;
    text-align: center;
    line-height: 1.6;
    background: var(--card-tint);
    border-radius: 8px;
    border: 1px dashed var(--border-strong);
  }
  .empty-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.55;
  }

  /* キャプチャカード */
  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }
  .item:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }

  /* ウィジェットタイトル (レイアウト API 由来) */
  .item-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 2px 0;
    letter-spacing: 0.1px;
  }

  /* ラベル入力 */
  .item-label-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .item-label-row input {
    flex: 1;
    font-weight: 600;
    color: var(--text);
    border: 1px solid transparent;
    background: transparent;
    padding: 4px 8px;
    font-size: 13px;
    border-radius: 5px;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .item-label-row input:hover {
    border-color: var(--border);
    background: var(--card-tint);
  }
  .item-label-row input:focus {
    border-color: var(--primary);
    background: var(--card);
    outline: none;
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .item-label-row input:disabled {
    color: var(--text-muted);
    background: transparent;
    border-color: transparent;
    cursor: not-allowed;
  }

  /* メタ情報 */
  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    color: var(--text-secondary);
    font-size: 11px;
    margin-bottom: 8px;
  }
  .meta-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: var(--primary-soft);
    border-radius: 5px;
    font-weight: 500;
    color: var(--primary-deep);
  }
  .meta-badge.warn {
    background: var(--warn-soft);
    color: var(--warn-text);
  }
  .meta-time {
    color: var(--text-muted);
    font-size: 11px;
    margin-left: auto;
  }
  .qid {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--card-tint);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 5px;
  }

  /* 列名チップ (データ型ごとに配色) */
  .item-cols {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .col-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 5px;
    font-size: 11px;
    line-height: 1.5;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .col-chip::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.55;
  }
  /* 暖色寄りのトーンで型を区別 (Claude UI に寄せたパレット) */
  .col-chip.type-varchar   { background: #f4efe7; color: #5a564c; border-color: #e6dfd1; }
  .col-chip.type-bigint    { background: #f4e3d0; color: #8b5424; border-color: #ead2b3; }
  .col-chip.type-int       { background: #f4e3d0; color: #8b5424; border-color: #ead2b3; }
  .col-chip.type-double    { background: #f4e3d0; color: #8b5424; border-color: #ead2b3; }
  .col-chip.type-timestamp { background: #e8e3d3; color: #5e5a40; border-color: #d8d1bb; }
  .col-chip.type-date      { background: #e8e3d3; color: #5e5a40; border-color: #d8d1bb; }
  .col-chip.type-boolean   { background: #f0e1d7; color: #74452c; border-color: #e3cdbd; }
  .col-chip.type-default   { background: #f4efe7; color: #5a564c; border-color: #e6dfd1; }

  /* 表示/非表示の状態オーバーレイ
     ウィジェット検出に成功した場合のみクラスが付与される。
     - chip-visible : 何もしない (型クラスのカラーをそのまま生かす)
     - chip-hidden  : グレーアウト + 点線枠で UI 上に出ていない列であることを示す */
  .col-chip.chip-hidden {
    background: var(--card-tint) !important;
    color: var(--text-muted) !important;
    border-color: var(--border) !important;
    border-style: dashed !important;
  }
  .col-chip.chip-hidden::before {
    opacity: 0.4;
  }

  /* アクション */
  .item-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .item-actions .btn {
    white-space: nowrap;
  }
</style>
</head>

<body>
  <header>
    <div class="header-title">
      <div class="header-logo">W</div>
      <h1>Workato Insights CSV</h1>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" id="refresh">更新</button>
    </div>
  </header>

  <div id="list"></div>

  <script src="popup.js"></script>
</body>
</html>
