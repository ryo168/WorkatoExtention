<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">

<!--
  CSP: 拡張機能内のリソースのみ許可。
       - default-src 'none'              : デフォルト全拒否
       - script-src  'self'              : popup.js のみ実行可
       - style-src   'self' 'unsafe-inline' : <style> ブロックを許可
       - img-src     'self' data:        : 自己リソースと data URL のみ
       外部 CDN・eval 等は一切利用不可とする。
-->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">

<title>Workato Insights CSV</title>

<style>
  /* ------------------------------------------------------------------------ */
  /* デザイントークン                                                          */
  /* ------------------------------------------------------------------------ */
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --primary: #0d9aa0;
    --primary-hover: #0a7e83;
    --primary-soft: #e6f5f5;
    --warn-soft: #fef3c7;
    --warn-text: #92400e;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 1px 3px rgba(15, 23, 42, 0.05),
                 0 4px 12px rgba(15, 23, 42, 0.05);
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    width: 560px;
    margin: 0;
    padding: 0;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
  }

  /* ------------------------------------------------------------------------ */
  /* ヘッダー                                                                  */
  /* ------------------------------------------------------------------------ */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--primary) 0%, #0a7e83 100%);
    color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .header-title { display: flex; align-items: center; gap: 8px; }
  .header-title h1 {
    font-size: 14px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .header-logo {
    width: 22px;
    height: 22px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .toolbar { display: flex; gap: 6px; }

  /* ------------------------------------------------------------------------ */
  /* ボタン                                                                    */
  /* ------------------------------------------------------------------------ */
  .btn {
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 5px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s ease;
    border: 1px solid transparent;
  }
  .btn-ghost {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.2);
  }
  .btn-ghost:hover { background: rgba(255, 255, 255, 0.25); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .btn-primary:hover {
    background: var(--primary-hover);
    border-color: var(--primary-hover);
  }
  .btn-secondary {
    background: #fff;
    color: var(--text-secondary);
    border-color: var(--border-strong);
  }
  .btn-secondary:hover {
    background: #f8fafc;
    color: var(--text);
  }
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* ------------------------------------------------------------------------ */
  /* リスト本体                                                                */
  /* ------------------------------------------------------------------------ */
  #list { padding: 12px 16px 16px; }

  /* 空状態 */
  .empty {
    color: var(--text-muted);
    padding: 40px 16px;
    text-align: center;
    line-height: 1.6;
    background: var(--card);
    border-radius: 8px;
    border: 1px dashed var(--border);
  }
  .empty-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  /* キャプチャカード */
  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .item:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }

  /* ラベル入力 */
  .item-label-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .item-label-row input {
    flex: 1;
    font-weight: 600;
    color: var(--text);
    border: 1px solid transparent;
    background: transparent;
    padding: 4px 8px;
    font-size: 13px;
    border-radius: 5px;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .item-label-row input:hover {
    border-color: var(--border);
    background: #f8fafc;
  }
  .item-label-row input:focus {
    border-color: var(--primary);
    background: #fff;
    outline: none;
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .item-label-row input:disabled {
    color: var(--text-muted);
    background: transparent;
    border-color: transparent;
    cursor: not-allowed;
  }

  /* メタ情報 */
  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    color: var(--text-secondary);
    font-size: 11px;
    margin-bottom: 8px;
  }
  .meta-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: #f1f5f9;
    border-radius: 4px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .meta-badge.warn {
    background: var(--warn-soft);
    color: var(--warn-text);
  }
  .meta-time {
    color: var(--text-muted);
    font-size: 11px;
    margin-left: auto;
  }
  .qid {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* 列名チップ (データ型ごとに配色) */
  .item-cols {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .col-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.5;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .col-chip::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.6;
  }
  .col-chip.type-varchar   { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
  .col-chip.type-bigint    { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .col-chip.type-int       { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .col-chip.type-double    { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .col-chip.type-timestamp { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
  .col-chip.type-date      { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
  .col-chip.type-boolean   { background: #ede9fe; color: #5b21b6; border-color: #ddd6fe; }
  .col-chip.type-default   { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }

  /* 表示/非表示の状態オーバーレイ
     ウィジェット検出に成功した場合のみクラスが付与される。
     - chip-visible : 何もしない (型クラスのカラーをそのまま生かす)
     - chip-hidden  : グレーアウト + 点線枠で UI 上に出ていない列であることを示す */
  .col-chip.chip-hidden {
    background: #f8fafc !important;
    color: #94a3b8 !important;
    border-color: #cbd5e1 !important;
    border-style: dashed !important;
  }
  .col-chip.chip-hidden::before {
    opacity: 0.4;
  }

  /* アクション */
  .item-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .item-actions .btn {
    white-space: nowrap;
  }
</style>
</head>

<body>
  <header>
    <div class="header-title">
      <div class="header-logo">W</div>
      <h1>Workato Insights CSV</h1>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" id="refresh">更新</button>
    </div>
  </header>

  <div id="list"></div>

  <script src="popup.js"></script>
</body>
</html>
